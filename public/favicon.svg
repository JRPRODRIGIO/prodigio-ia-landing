<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Mask for circle 1: hide where circle 2 passes in front (upper-right of overlap) -->
    <mask id="m1">
      <rect width="100" height="100" fill="white"/>
      <circle cx="62" cy="62" r="27" fill="black"/>
      <polygon points="0,0 100,100 0,100" fill="white"/>
    </mask>
    <!-- Mask for circle 2: hide where circle 1 passes in front (lower-left of overlap) -->
    <mask id="m2">
      <rect width="100" height="100" fill="white"/>
      <circle cx="38" cy="38" r="27" fill="black"/>
      <polygon points="0,0 100,0 100,100" fill="white"/>
    </mask>
  </defs>
  <!-- Circle 2 (lower-right) -->
  <circle cx="62" cy="62" r="27" fill="none" stroke="#1D4ED8" stroke-width="7" mask="url(#m2)"/>
  <!-- Circle 1 (upper-left) — drawn on top -->
  <circle cx="38" cy="38" r="27" fill="none" stroke="#1D4ED8" stroke-width="7" mask="url(#m1)"/>
</svg>